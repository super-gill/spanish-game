<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>El/La preview</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; background:#fbf8f3; color:#1a2332; text-align:center; padding:2rem; }
  .label-toggle { display:flex; align-items:center; justify-content:center; gap:.4rem; margin-bottom:.75rem; }
  .label-toggle-caption { font-size:.8rem; color:#7a7466; }
  .chip { font-size:.8rem; padding:.3rem .7rem; border:1px solid #d9d2c4; border-radius:999px; background:#fbf8f3; color:#1a2332; cursor:pointer; }
  .chip.active { background:#1a2332; color:#fff; border-color:#1a2332; }
  .prompt-card { background:#fff; border:1px solid #eee6d8; border-radius:18px; padding:1.75rem 1.5rem; max-width:360px; margin:0 auto 1rem; }
  .prompt-ask { font-size:.95rem; margin-bottom:.5rem; }
  .obj-card { display:inline-flex; align-items:center; justify-content:center; width:220px; height:220px; background:#fff; border:1px solid #e6e0d4; border-radius:16px; box-shadow:0 2px 8px rgba(0,0,0,.05); padding:14px; margin:0 auto .5rem; }
  .obj-img { max-width:100%; max-height:100%; object-fit:contain; }
  .obj-label { font-size:1rem; color:#7a7466; margin-bottom:.25rem; }
  .obj-label-es { font-family:Georgia,serif; font-style:italic; color:#1a2332; }
  .binary-options { display:flex; gap:.5rem; justify-content:center; max-width:360px; margin:0 auto; }
  .option-btn { flex:1; padding:.85rem; border:1px solid #d9d2c4; border-radius:12px; background:#fff; font-size:1.1rem; cursor:pointer; }
</style></head>
<body>
  <div class="label-toggle">
    <span class="label-toggle-caption">Label</span>
    <button class="chip active" data-label="en">English</button>
    <button class="chip" data-label="es">Español</button>
    <button class="chip" data-label="off">Off</button>
  </div>
  <div class="prompt-card">
    <div class="prompt-ask">What's the article?</div>
    <div id="stage"></div>
  </div>
  <div class="binary-options"><button class="option-btn" data-choice="el">el</button><button class="option-btn" data-choice="la">la</button></div>
  <div id="feedback" style="margin-top:1rem;font-family:Georgia,serif;"></div>
<script>
  // A few sample nouns: some with images, one word-only to show the fallback.
  const nouns = [
    { noun:'sofá', article:'el', info:{ img:'assets/Objects/sofa.png', en:'sofa' } },
    { noun:'mesa', article:'la', info:{ img:'assets/Objects/mesa.png', en:'table' } },
    { noun:'reloj', article:'el', info:{ img:'assets/Objects/reloj.png', en:'clock' } },
    { noun:'familia', article:'la', info:null },
  ];
  let idx=0, mode='en', answered=false;
  function cur(){ return nouns[idx]; }
  function render(){
    const n=cur();
    if(n.info){
      let label='';
      if(mode==='en') label=`<div class="obj-label">${n.info.en}</div>`;
      else if(mode==='es') label=`<div class="obj-label obj-label-es">${n.noun}</div>`;
      document.getElementById('stage').innerHTML = `<div class="obj-card"><img class="obj-img" src="${n.info.img}" alt=""></div>${label}`;
    } else {
      document.getElementById('stage').innerHTML = `<div style="font-family:Georgia,serif;font-size:2rem;">${n.noun}</div>`;
    }
  }
  function reset(){
    answered=false;
    document.getElementById('feedback').innerHTML='';
    document.querySelectorAll('[data-choice]').forEach(b=>b.disabled=false);
    render();
  }
  document.querySelectorAll('[data-choice]').forEach(b=>b.addEventListener('click',()=>{
    if(answered) return;
    answered=true;
    const n=cur();
    const ok = b.dataset.choice===n.article;
    document.querySelectorAll('[data-choice]').forEach(x=>x.disabled=true);
    document.getElementById('feedback').innerHTML = (ok
      ? `<span style="color:#2e7d32;">✓ ${n.article} ${n.noun}</span>`
      : `<span style="color:#c2624a;">✗ It's ${n.article} ${n.noun}</span>`)
      + ` <button class="option-btn" id="next" style="margin-left:.75rem;padding:.4rem 1rem;">Next</button>`;
    document.getElementById('next').addEventListener('click',()=>{ idx=(idx+1)%nouns.length; reset(); });
  }));
  document.querySelectorAll('[data-label]').forEach(b=>b.addEventListener('click',()=>{
    mode=b.dataset.label;
    document.querySelectorAll('[data-label]').forEach(x=>x.classList.toggle('active',x.dataset.label===mode));
    render();
  }));
  render();
</script>
</body></html>
