<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spanish Practice</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #fbf8f3;
    color: #1a2332;
    padding: 1.25rem;
    line-height: 1.5;
    min-height: 100vh;
  }
  .container { max-width: 720px; margin: 0 auto; }

  /* Header */
  header {
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid #d5cfc1;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 1rem;
  }
  h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-weight: 400;
    font-size: 1.75rem;
    letter-spacing: -0.01em;
  }
  .back-btn {
    background: transparent;
    border: none;
    color: #7a7466;
    font-family: inherit;
    font-size: 0.9rem;
    cursor: pointer;
    padding: 0.25rem 0.5rem;
  }
  .back-btn:hover { color: #1a2332; }
  .back-btn.hidden { display: none; }

  /* Home view */
  .stats-overview {
    background: white;
    border: 1px solid #d5cfc1;
    border-radius: 10px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 1.5rem;
    font-size: 0.85rem;
  }
  .stat-block { display: flex; flex-direction: column; }
  .stat-label { color: #7a7466; font-size: 0.78rem; }
  .stat-value { font-family: Georgia, serif; font-size: 1.5rem; color: #1a2332; }
  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 0.85rem;
  }
  .game-card {
    background: white;
    border: 1px solid #d5cfc1;
    border-radius: 10px;
    padding: 1rem 1.25rem;
    text-align: left;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
  }
  .game-card:hover {
    border-color: #1a2332;
    transform: translateY(-1px);
  }
  .game-card-title {
    font-family: Georgia, serif;
    font-size: 1.1rem;
    color: #1a2332;
    margin-bottom: 0.25rem;
  }
  .game-card-desc {
    font-size: 0.8rem;
    color: #7a7466;
    margin-bottom: 0.5rem;
  }
  .game-card-stats {
    font-size: 0.75rem;
    color: #5a5446;
  }

  /* Game view shared */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-bottom: 1.5rem;
  }
  .filter-btn {
    padding: 0.4rem 0.85rem;
    background: transparent;
    border: 1px solid #d5cfc1;
    border-radius: 999px;
    color: #1a2332;
    font-size: 0.85rem;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: #1a2332; }
  .filter-btn.active {
    background: #1a2332;
    color: #fbf8f3;
    border-color: #1a2332;
  }
  .prompt-card {
    background: white;
    border: 1px solid #d5cfc1;
    border-radius: 12px;
    padding: 1.75rem 1.5rem;
    margin-bottom: 1rem;
    text-align: center;
  }
  .prompt-main {
    font-family: Georgia, serif;
    font-size: 2rem;
    font-weight: 500;
    margin-bottom: 0.25rem;
    letter-spacing: -0.01em;
  }
  .prompt-meta {
    font-size: 0.85rem;
    color: #7a7466;
    margin-bottom: 1.25rem;
  }
  .prompt-ask { font-size: 0.95rem; color: #1a2332; margin-bottom: 0.5rem; }
  .prompt-target {
    font-family: Georgia, serif;
    font-size: 1.4rem;
    color: #c2624a;
  }
  .controls-caption { font-size: 0.8rem; color: #7a7466; align-self: center; margin-right: 0.15rem; }
  .verb-tense-pill {
    display: inline-block;
    background: #1a2332;
    color: #fff;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.25rem 0.65rem;
    border-radius: 999px;
    margin: 0.35rem 0 0.75rem;
  }
  .prompt-meaning { font-size: 0.95rem; color: #7a7466; font-style: italic; margin-top: 0.6rem; min-height: 1.2em; }
  .prompt-cat { font-size: 0.82rem; color: #8a8474; margin-top: 0.3rem; min-height: 1.1em; }
  .autoadvance { font-size: 0.82rem; color: #7a7466; margin-top: 0.5rem; }
  .accent-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    margin: -0.4rem 0 1rem;
  }
  .accent-key {
    font-family: Georgia, serif;
    font-size: 1.05rem;
    min-width: 2.1rem;
    padding: 0.4rem 0.5rem;
    border: 1px solid #d9d2c4;
    border-radius: 8px;
    background: #fff;
    color: #1a2332;
    cursor: pointer;
    line-height: 1;
  }
  .accent-key:hover { background: #f2ede3; }
  .accent-key:active { background: #e6dece; }
  .obj-card {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 220px;
    height: 220px;
    max-width: 70vw;
    max-height: 70vw;
    background: #ffffff;
    border: 1px solid #e6e0d4;
    border-radius: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    padding: 14px;
    margin: 0 auto 0.5rem;
  }
  .obj-img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }
  .obj-label {
    font-size: 1rem;
    color: #7a7466;
    margin-bottom: 0.25rem;
  }
  .obj-label-es {
    font-family: Georgia, serif;
    font-style: italic;
    color: #1a2332;
  }
  .label-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    margin-bottom: 0.75rem;
    flex-wrap: wrap;
  }
  .label-toggle-caption {
    font-size: 0.8rem;
    color: #7a7466;
    margin-right: 0.15rem;
  }
  .chip {
    font-size: 0.8rem;
    padding: 0.3rem 0.7rem;
    border: 1px solid #d9d2c4;
    border-radius: 999px;
    background: #fbf8f3;
    color: #1a2332;
    cursor: pointer;
  }
  .chip.active {
    background: #1a2332;
    color: #fff;
    border-color: #1a2332;
  }
  .input-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  input[type="text"] {
    flex: 1;
    padding: 0.85rem 1rem;
    font-size: 1.1rem;
    font-family: inherit;
    border: 1px solid #d5cfc1;
    border-radius: 8px;
    background: white;
    color: #1a2332;
    min-width: 0;
  }
  input[type="text"]:focus { outline: none; border-color: #1a2332; }
  button.primary {
    padding: 0.85rem 1.5rem;
    background: #1a2332;
    color: #fbf8f3;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-family: inherit;
    cursor: pointer;
    flex-shrink: 0;
  }
  button.primary:hover { background: #2a3343; }
  button.primary:disabled { background: #b5b0a3; cursor: not-allowed; }
  .feedback {
    padding: 1rem 1.25rem;
    border-radius: 8px;
    margin-bottom: 1rem;
    font-size: 0.95rem;
  }
  .feedback.correct { background: #e8f1e6; color: #2d5a2d; border-left: 3px solid #3a7a3a; }
  .feedback.almost  { background: #fdf6e3; color: #7a5a1f; border-left: 3px solid #d4a849; }
  .feedback.incorrect { background: #fce8e8; color: #7a2d2d; border-left: 3px solid #a33838; }
  .feedback strong { font-weight: 600; }

  /* Hint button — for hiding translations behind a "cheat" reveal */
  .hint-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    margin: -0.5rem 0 1.25rem 0;
    min-height: 1.6rem;
  }
  .hint-btn {
    background: transparent;
    border: 1px solid #d5cfc1;
    color: #7a7466;
    padding: 0.2rem 0.7rem;
    border-radius: 999px;
    font-size: 0.78rem;
    font-family: inherit;
    cursor: pointer;
  }
  .hint-btn:hover { color: #1a2332; border-color: #1a2332; }
  .hint-text {
    font-size: 0.85rem;
    color: #7a7466;
    font-style: italic;
  }
  .hint-text.hidden { display: none; }
  .hint-btn.hidden { display: none; }

  /* Multiple choice options */
  .option-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
    margin-bottom: 1rem;
  }
  .option-btn {
    padding: 0.85rem 1rem;
    background: white;
    border: 1px solid #d5cfc1;
    border-radius: 8px;
    font-size: 1rem;
    font-family: inherit;
    cursor: pointer;
    color: #1a2332;
    transition: all 0.1s;
  }
  .option-btn:hover { border-color: #1a2332; }
  .option-btn.correct { background: #e8f1e6; border-color: #3a7a3a; color: #2d5a2d; }
  .option-btn.incorrect { background: #fce8e8; border-color: #a33838; color: #7a2d2d; }
  .option-btn:disabled { cursor: default; }

  /* Big binary options (el/la) */
  .binary-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  .binary-options .option-btn {
    padding: 1.5rem;
    font-family: Georgia, serif;
    font-size: 1.75rem;
  }

  /* Recognition game */
  .recog-word {
    font-family: Georgia, serif;
    font-size: 2.5rem;
    text-align: center;
    padding: 2rem 1rem 1rem;
  }
  .recog-reveal-area {
    margin: 1rem 0;
    padding: 1rem 1.25rem;
    background: #f7f3eb;
    border: 1px solid #d5cfc1;
    border-radius: 8px;
    min-height: 1rem;
  }
  .recog-reveal-area.hidden { display: none; }
  .recog-meaning {
    font-size: 1.25rem;
    color: #1a2332;
    margin-bottom: 0.5rem;
  }
  .recog-meta {
    font-size: 0.9rem;
    color: #5a5040;
    margin-bottom: 0.4rem;
  }
  .recog-sample {
    font-family: Georgia, serif;
    font-size: 0.95rem;
    color: #3a3525;
    font-style: italic;
    margin-top: 0.5rem;
    line-height: 1.5;
  }
  .rate-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.5rem;
    margin-top: 1rem;
  }
  .rate-row.binary {
    grid-template-columns: repeat(2, 1fr);
  }
  .rate-btn {
    padding: 0.85rem 0.5rem;
    background: white;
    border: 1px solid #d5cfc1;
    border-radius: 8px;
    font-size: 0.95rem;
    font-family: inherit;
    cursor: pointer;
    color: #1a2332;
  }
  .rate-btn:hover { border-color: #1a2332; }
  .rate-btn.knew { border-color: #3a7a3a; color: #2d5a2d; }
  .rate-btn.knew:hover { background: #e8f1e6; }
  .rate-btn.fuzzy { border-color: #9a7a2a; color: #6a5a1a; }
  .rate-btn.fuzzy:hover { background: #f3edd8; }
  .rate-btn.didnt { border-color: #a33838; color: #7a2d2d; }
  .rate-btn.didnt:hover { background: #fce8e8; }

  /* Sentence parse mode */
  .recog-sentence {
    font-family: Georgia, serif;
    font-size: 1.4rem;
    line-height: 2.2;
    padding: 1.5rem 1rem;
    text-align: center;
  }
  .word-chip {
    display: inline-block;
    padding: 0.15rem 0.4rem;
    margin: 0.1rem 0.1rem;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.1s;
    border-bottom: 1px dotted transparent;
  }
  .word-chip:hover {
    background: #f0e9d6;
    border-bottom-color: #8a7a4a;
  }
  .word-chip.active {
    background: #e3d8b3;
    border-bottom-color: #8a7a4a;
  }
  .word-chip.unknown {
    color: #8a7a6a;
  }
  .word-popover {
    background: #1a2332;
    color: #f5f0e3;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    margin: 0.75rem 0;
    font-size: 0.95rem;
    line-height: 1.5;
  }
  .word-popover .pop-word {
    font-family: Georgia, serif;
    font-size: 1.1rem;
    font-weight: bold;
    margin-bottom: 0.2rem;
  }
  .word-popover .pop-meta {
    color: #c5b8a0;
    font-size: 0.85rem;
  }
  .recog-mode-toggle {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .recog-mode-toggle .filter-btn {
    flex: 1;
  }

  /* Tile builder */
  .tile-target {
    min-height: 4rem;
    background: white;
    border: 2px dashed #d5cfc1;
    border-radius: 8px;
    padding: 0.75rem;
    margin-bottom: 0.75rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    align-items: center;
  }
  .tile-bank {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-bottom: 1rem;
    padding: 0.75rem;
    background: #f0ebe1;
    border-radius: 8px;
    min-height: 3rem;
  }
  .tile {
    padding: 0.5rem 0.85rem;
    background: white;
    border: 1px solid #d5cfc1;
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.95rem;
    cursor: pointer;
    color: #1a2332;
  }
  .tile:hover { border-color: #1a2332; }
  .tile.placed { background: #1a2332; color: #fbf8f3; cursor: grab; touch-action: none; }
  .tile.placed.dragging { opacity: 0.5; cursor: grabbing; }
  .tile.placed.wrong { background: #b23b2e; color: #fff; box-shadow: 0 0 0 2px rgba(178,59,46,0.35); }
  .tile.placed.misplaced { background: #d9a520; color: #1a2332; box-shadow: 0 0 0 2px rgba(217,165,32,0.4); }
  .sb-hint { font-size: 0.8rem; color: #7a7466; margin: 0.25rem 0 0.75rem; }
  .app-version { text-align: center; font-size: 0.72rem; color: #b8b0a0; margin-top: 1.5rem; letter-spacing: 0.03em; }

  /* Place-action checkbox grid */
  .check-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .check-item {
    padding: 0.65rem 0.85rem;
    background: white;
    border: 1px solid #d5cfc1;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.9rem;
    color: #1a2332;
    text-align: left;
  }
  .check-item.selected { background: #1a2332; color: #fbf8f3; border-color: #1a2332; }
  .check-item.true-positive { background: #e8f1e6; border-color: #3a7a3a; color: #2d5a2d; }
  .check-item.false-positive { background: #fce8e8; border-color: #a33838; color: #7a2d2d; }
  .check-item.missed { background: #fdf6e3; border-color: #d4a849; color: #7a5a1f; }

  /* Stats area inside game */
  .game-stats {
    font-size: 0.85rem;
    color: #7a7466;
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid #d5cfc1;
  }
  .stats-row { display: flex; justify-content: space-between; margin-bottom: 0.25rem; }
  .stats-row strong { color: #1a2332; font-weight: 600; }
  .weak-spots-title { font-weight: 600; margin-top: 0.75rem; margin-bottom: 0.35rem; color: #1a2332; font-size: 0.85rem; }
  .weak-spot {
    display: inline-block;
    padding: 0.2rem 0.55rem;
    margin: 0.15rem 0.2rem 0.15rem 0;
    background: #f0ebe1;
    border-radius: 4px;
    font-size: 0.78rem;
    color: #5a5446;
  }

  /* Dialogue */
  .dialogue-turn {
    padding: 0.85rem 1rem;
    margin-bottom: 0.5rem;
    border-radius: 8px;
    background: white;
    border: 1px solid #d5cfc1;
  }
  .dialogue-turn.you { border-left: 3px solid #c2624a; }
  .dialogue-turn.other { border-left: 3px solid #7a7466; background: #f0ebe1; }
  .dialogue-speaker {
    font-size: 0.78rem;
    font-weight: 600;
    color: #7a7466;
    margin-bottom: 0.2rem;
  }
  .dialogue-text { font-size: 0.95rem; }
  .dialogue-english { font-size: 0.85rem; color: #7a7466; font-style: italic; margin-top: 0.25rem; }

  .empty-state {
    text-align: center;
    padding: 2rem;
    color: #7a7466;
    background: white;
    border: 1px dashed #d5cfc1;
    border-radius: 10px;
  }

  .hidden { display: none !important; }

  /* La Casa image game (image-based room/object quiz) */
  .house-stage {
    position: relative;
    max-width: 640px;
    margin: 0 auto 1.25rem;
    border: 1px solid #d5cfc1;
    border-radius: 12px;
    overflow: hidden;
    background: #efeae0;
    min-height: 120px;
  }
  .house-img { width: 100%; display: block; }
  .house-marker {
    position: absolute;
    width: 12%;
    aspect-ratio: 1 / 1;
    transform: translate(-50%, -50%);
    border: 4px solid #c2624a;
    border-radius: 50%;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.7), 0 2px 8px rgba(0,0,0,0.35);
    pointer-events: none;
  }
  .house-marker-label {
    position: absolute;
    left: 50%;
    bottom: 100%;
    transform: translateX(-50%);
    margin-bottom: 8px;
    background: #1a2332;
    color: #fbf8f3;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 0.85rem;
    font-weight: 600;
    white-space: nowrap;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }
  .house-marker.label-below .house-marker-label {
    bottom: auto;
    top: 100%;
    margin-bottom: 0;
    margin-top: 8px;
  }
  .house-img-missing {
    padding: 2rem 1.25rem;
    text-align: center;
    color: #7a2d2d;
    font-size: 0.9rem;
  }

  /* Clock game */
  .clock-face { text-align: center; margin: 0 auto 1.25rem; min-height: 210px; }
  .clock-digital {
    display: inline-block;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 3.6rem; font-weight: 700; letter-spacing: 0.08em;
    color: #fbf8f3; background: #1a2332;
    padding: 1.2rem 2rem; border-radius: 12px; margin-top: 1.5rem;
    border: 1px solid #d5cfc1;
  }

  /* Errands (click-the-place) game */
  .errand-wrap { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; margin-bottom: 1rem; }
  .errand-side { flex: 0 0 175px; text-align: center; }
  .errand-bubble {
    position: relative; background: #fff; border: 1px solid #d5cfc1; border-radius: 14px;
    padding: 12px 14px; margin-bottom: 14px; font-family: Georgia, serif;
    font-size: 1.02rem; color: #1a2332; line-height: 1.35;
  }
  .errand-bubble:after {
    content: ''; position: absolute; left: 34px; bottom: -9px; width: 15px; height: 15px;
    background: #fff; border-right: 1px solid #d5cfc1; border-bottom: 1px solid #d5cfc1; transform: rotate(45deg);
  }
  .errand-char { width: 150px; height: auto; display: block; margin: 0 auto; }
  .errand-name { font-weight: 600; font-size: 0.9rem; color: #5a5446; margin-top: 2px; }
  .errand-scene {
    position: relative; flex: 1 1 380px; max-width: 640px;
    border: 1px solid #d5cfc1; border-radius: 10px; overflow: hidden; cursor: pointer;
  }
  .errand-scene img { width: 100%; display: block; }
  .errand-scene.answered { cursor: default; }
  .errand-ring {
    position: absolute; transform: translate(-50%, -50%); aspect-ratio: 1 / 1;
    border-radius: 50%; pointer-events: none; box-shadow: 0 0 0 3px rgba(255,255,255,0.55);
  }
  .errand-ring.correct { border: 4px solid #3a7a3a; }
  .errand-ring.wrong { border: 4px solid #a33838; box-shadow: none; }

  @media (max-width: 480px) {
    .prompt-main { font-size: 1.65rem; }
    .input-row { flex-direction: column; }
    button.primary { width: 100%; }
    .option-grid { grid-template-columns: 1fr; }
    .games-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div style="display:flex; align-items:baseline; gap:0.5rem;">
      <button class="back-btn hidden" id="back-btn">← Home</button>
      <h1 id="page-title">Spanish Practice</h1>
    </div>
  </header>

  <main id="main"></main>
</div>

<script>
// =============================================================================
// CONTENT DATABASE
// To add or update content, edit the arrays below. Each game pulls from here.
// Sections mirror the structure of Spanish_1.md.
// =============================================================================

const DATA = {
  // Noun -> image for the El/La game. Objects are flat icons; rooms reuse house scenes.

// =============================================================================
// STORAGE
// =============================================================================
const STORAGE_KEY = 'jason-spanish-app-v1';
const GAME_KEYS = ['verbs','vocab','sentenceBuilder','fillBlank','articles','numbers','placeAction','dialogue','recognition','house','city','clock','errands'];

// Use null-prototype objects so keys like "constructor", "toString", etc.
// don't collide with Object.prototype properties.
function makeProgress() {
  const p = Object.create(null);
  GAME_KEYS.forEach(k => { p[k] = Object.create(null); });
  return p;
}
let progress = makeProgress();

// Storage adapter: prefer the Claude artifacts window.storage API when present
// (claude.ai). Otherwise fall back to localStorage so progress persists when the
// app is hosted (e.g. GitHub Pages) or opened as a local file. In the artifacts
// environment window.storage exists, so localStorage is never touched there.
const Store = {
  async get(k) {
    if (typeof window !== 'undefined' && window.storage && window.storage.get) {
      return await window.storage.get(k);
    }
    try { const v = localStorage.getItem(k); return v == null ? null : { value: v }; }
    catch (e) { return null; }
  },
  async set(k, v) {
    if (typeof window !== 'undefined' && window.storage && window.storage.set) {
      return await window.storage.set(k, v);
    }
    try { localStorage.setItem(k, v); } catch (e) {}
  }
};

async function loadProgress() {
  try {
    const r = await Store.get(STORAGE_KEY);
    if (r && r.value) {
      const loaded = JSON.parse(r.value);
      const fresh = makeProgress();
      for (const game of GAME_KEYS) {
        if (loaded[game] && typeof loaded[game] === 'object') {
          for (const key of Object.keys(loaded[game])) {
            fresh[game][key] = loaded[game][key];
          }
        }
      }
      progress = fresh;
    }
  } catch (e) {}
}

async function saveProgress() {
  try { await Store.set(STORAGE_KEY, JSON.stringify(progress)); }
  catch (e) { /* storage unavailable; progress stays in memory for this session */ }
}

// UTILITIES
// =============================================================================
function normalize(s) {
  return s.toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

// Words whose accent or \u00f1, if dropped, spell a DIFFERENT real word. Keyed by the
// de-accented form -> what that de-accented form actually means. Used to warn the
// learner (in the yellow "accent matters" feedback) what they literally wrote.
const ACCENT_TRAPS = {
  'ano': 'anus (a\u00f1o = year)',
  'papa': 'potato, or the Pope (pap\u00e1 = dad)',
  'si': 'if (s\u00ed = yes)',
  'tu': 'your (t\u00fa = you)',
  'el': 'the (\u00e9l = he)',
  'mi': 'my (m\u00ed = me)',
  'te': 'you, object pronoun (t\u00e9 = tea)',
  'mas': 'but (m\u00e1s = more)',
  'esta': 'this (est\u00e1 = is)',
  'ingles': 'groins (ingl\u00e9s = English)',
  'cono': 'cone (co\u00f1o is a vulgar exclamation)'
};

// Returns a warning string if the de-accented form of `word` is a real different word.
function accentTrapNote(word) {
  const k = normalize(word);
  return ACCENT_TRAPS[k]
    ? ` <strong>Heads up:</strong> without the accent, "${k}" means <em>${ACCENT_TRAPS[k]}</em>.`
    : '';
}

// Synonyms: alternative Spanish words with the same meaning. Any member of a group
// is accepted as the answer for any other, and members are kept from showing up as
// each other's wrong multiple-choice options.
const SYNONYM_GROUPS = [
  ['frigorífico', 'nevera'],
  ['televisión', 'televisor'],
  ['salón', 'sala de estar'],
  ['apartamento', 'piso'],
  ['correos', 'oficina de correos'],
  ['comisaría', 'comisaría de policía']
];
const WORD_ALTS = {};
SYNONYM_GROUPS.forEach(g => g.forEach(w => { WORD_ALTS[w] = g.filter(x => x !== w); }));
function altsFor(es) { return WORD_ALTS[es] || []; }

// How well `answer` matches `expected`, tolerant of a leading article, accents and
// synonyms. Returns 'exact', 'accent' (right word, accent off), or 'no'.
function answerMatch(answer, expected) {
  const strip = s => s.toLowerCase().trim().replace(/^(el|la|los|las|un|una|unos|unas)\s+/, '').trim();
  const cands = [expected, ...altsFor(expected)];
  const a = strip(answer);
  if (cands.some(c => a === strip(c))) return 'exact';
  const na = normalize(a);
  if (cands.some(c => na === normalize(strip(c)))) return 'accent';
  return 'no';
}

function recordResult(game, key, correct) {
  if (!progress[game][key]) progress[game][key] = { correct: 0, incorrect: 0 };
  if (correct) progress[game][key].correct++;
  else progress[game][key].incorrect++;
  saveProgress();
}

function pickWeighted(items, weightFn) {
  if (items.length === 0) return null;
  const weights = items.map(weightFn);
  // Safety: if any weight is not a finite positive number, fall back to uniform random.
  if (!weights.every(w => Number.isFinite(w) && w > 0)) {
    return items[Math.floor(Math.random() * items.length)];
  }
  const total = weights.reduce((a,b) => a+b, 0);
  let r = Math.random() * total;
  for (let i = 0; i < items.length; i++) {
    r -= weights[i];
    if (r <= 0) return items[i];
  }
  return items[items.length - 1];
}

// Per-game memory of recently shown concept keys, for the anti-repeat cooldown.
const _recentByGame = Object.create(null);

// Smarter selection used by every game:
//  1. Deduplicate items by a concept key (keyFn) so a word that appears many times
//     (e.g. "árbol" across scenes) counts once and isn't over-served.
//  2. Skip concepts shown in the last few picks (cooldown) so nothing repeats
//     back-to-back or too soon.
//  3. Weight the remaining concepts by weakness (weightForKey) so things you get
//     wrong come back sooner. Returns { item, key } — record results under `key`.
function pickSmart(game, items, keyFn) {
  if (!items || items.length === 0) return { item: null, key: null };
  const groups = Object.create(null);
  const order = [];
  for (const it of items) {
    const k = keyFn(it);
    if (!groups[k]) { groups[k] = []; order.push(k); }
    groups[k].push(it);
  }
  const recent = _recentByGame[game] || [];
  let poolKeys = order.filter(k => recent.indexOf(k) === -1);
  if (poolKeys.length === 0) poolKeys = order; // pool smaller than the cooldown window
  const key = pickWeighted(poolKeys, k => weightForKey(game, k));
  const insts = groups[key];
  const item = insts[Math.floor(Math.random() * insts.length)];
  const window = Math.min(Math.max(order.length - 1, 0), 6);
  _recentByGame[game] = [key, ...recent.filter(k => k !== key)].slice(0, window);
  return { item, key };
}

// Spell an integer in (Spain) Spanish. Correct for 0..999999 including cien vs
// ciento, quinientos/setecientos/novecientos, and apocope before mil (veintiún mil).
function numberToSpanish(n) {
  n = Math.floor(n);
  if (n === 0) return 'cero';
  const ones = ['','uno','dos','tres','cuatro','cinco','seis','siete','ocho','nueve','diez','once','doce','trece','catorce','quince','dieciséis','diecisiete','dieciocho','diecinueve','veinte','veintiuno','veintidós','veintitrés','veinticuatro','veinticinco','veintiséis','veintisiete','veintiocho','veintinueve'];
  const tens = ['','','','treinta','cuarenta','cincuenta','sesenta','setenta','ochenta','noventa'];
  const hundreds = ['','ciento','doscientos','trescientos','cuatrocientos','quinientos','seiscientos','setecientos','ochocientos','novecientos'];
  const u100 = x => { if (x < 30) return ones[x]; const t = Math.floor(x/10), o = x%10; return o === 0 ? tens[t] : tens[t] + ' y ' + ones[o]; };
  const u1000 = x => { if (x < 100) return u100(x); if (x === 100) return 'cien'; const h = Math.floor(x/100), r = x%100; return hundreds[h] + (r ? ' ' + u100(r) : ''); };
  const apoc = s => s.replace(/veintiuno$/, 'veintiún').replace(/(^|\s)uno$/, '$1un');
  if (n < 1000) return u1000(n);
  const th = Math.floor(n/1000), r = n%1000;
  const milPart = th === 1 ? 'mil' : apoc(u1000(th)) + ' mil';
  return milPart + (r ? ' ' + u1000(r) : '');
}

// Tolerant number-answer check: ignores accents, treats un/uno as equal, and
// drops euros/céntimos so "doce euros con cincuenta" == "doce con cincuenta".
function numAccept(answer, expected) {
  const canon = s => normalize(s)
    .replace(/\beuros?\b/g, ' ').replace(/\bcentimos?\b/g, ' ')
    .replace(/\bveintiun\b/g, 'veintiuno').replace(/\bun\b/g, 'uno')
    .replace(/\s+/g, ' ').trim();
  return canon(answer) === canon(expected);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function weightForKey(gameKey, itemKey) {
  const s = progress[gameKey][itemKey];
  // Defensive: only treat s as stats if it's an actual stats object.
  // Protects against prototype-pollution and corrupted storage.
  if (!s || typeof s !== 'object' || typeof s.correct !== 'number' || typeof s.incorrect !== 'number') return 3;
  const total = s.correct + s.incorrect;
  if (total === 0) return 3;
  const acc = s.correct / total;
  return 1 + (1 - acc) * 4;
}

function gameAggregateStats(gameKey) {
  let c = 0, i = 0;
  Object.values(progress[gameKey]).forEach(s => {
    if (s && typeof s === 'object' && typeof s.correct === 'number' && typeof s.incorrect === 'number') {
      c += s.correct; i += s.incorrect;
    }
  });
  return { correct: c, incorrect: i, total: c + i };
}

function weakSpotsForGame(gameKey, formatFn) {
  const items = [];
  Object.keys(progress[gameKey]).forEach(key => {
    const s = progress[gameKey][key];
    if (!s || typeof s !== 'object' || typeof s.correct !== 'number' || typeof s.incorrect !== 'number') return;
    const t = s.correct + s.incorrect;
    if (t >= 2 && s.correct / t < 0.7) items.push({ key, acc: s.correct/t, total: t });
  });
  items.sort((a,b) => a.acc - b.acc);
  return items.slice(0, 8).map(formatFn);
}

// =============================================================================
// SPANISH SPECIAL-CHARACTER BAR
// =============================================================================
// Renders a row of clickable buttons for characters not on an English keyboard.
// Usage: put ${accentBar('input-id')} in the markup, then call wireAccentBar(root)
// after inserting it so the buttons insert their character at the cursor.

const ACCENT_CHARS = ['á','é','í','ó','ú','ñ','ü','¿','¡'];

function accentBar(inputId) {
  return `<div class="accent-bar" data-target="${inputId}">` +
    ACCENT_CHARS.map(c => `<button type="button" class="accent-key" data-char="${c}">${c}</button>`).join('') +
    `</div>`;
}

function insertAtCursor(input, text) {
  if (!input) return;
  const start = input.selectionStart != null ? input.selectionStart : input.value.length;
  const end = input.selectionEnd != null ? input.selectionEnd : input.value.length;
  input.value = input.value.slice(0, start) + text + input.value.slice(end);
  const pos = start + text.length;
  input.focus();
  try { input.setSelectionRange(pos, pos); } catch (e) {}
}

function wireAccentBar(root) {
  (root || document).querySelectorAll('.accent-bar').forEach(bar => {
    const targetId = bar.dataset.target;
    bar.querySelectorAll('.accent-key').forEach(btn => {
      // mousedown preventDefault keeps focus/selection in the input on click
      btn.addEventListener('mousedown', e => e.preventDefault());
      btn.addEventListener('click', () => insertAtCursor(document.getElementById(targetId), btn.dataset.char));
    });
  });
}

      <div class="stats-row"><span>Attempts</span><strong>${s.total}</strong></div>
      <div class="stats-row"><span>Accuracy</span><strong>${acc}</strong></div>
      <div class="weak-spots-title">Weak spots</div>
      <div>${weak.length ? weak.join('') : (s.total > 0 ? 'None showing yet.' : 'None yet, keep going.')}</div>
    </div>`;
  },

  refreshStatsBlock() {
    const block = document.getElementById('stats-block');
    if (block) block.outerHTML = this.renderStatsBlock();
  },

  setMode(mode) {
    this.state.mode = mode;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
    this.next();
  },

  getActiveTenses() {
    if (this.state.mode === 'present') return ['present'];
    if (this.state.mode === 'past') return ['past'];
    return ['present','past'];
  },

  pick() {
    const activeTenses = this.getActiveTenses();
    let pool = DATA.verbs.filter(v => activeTenses.some(t => v.conj[t]));
    if (this.state.mode === 'regular') pool = pool.filter(v => v.cat.startsWith('reg-'));

    const combos = [];
    pool.forEach(verb => {
      Object.keys(verb.conj).forEach(tense => {
        if (!activeTenses.includes(tense)) return;
        this.PERSONS.forEach(person => combos.push({ verb, tense, person }));
      });
    });

    if (this.state.mode === 'weak') {
      const weakCombos = combos.filter(c => {
        const k = `${c.verb.inf}:${c.person}:${c.tense}`;
        const s = progress.verbs[k];
        if (!s || s.correct + s.incorrect < 2) return false;
        return s.correct / (s.correct + s.incorrect) < 0.7;
      });
      if (weakCombos.length > 0) return pickSmart('verbs', weakCombos, c => `${c.verb.inf}:${c.person}:${c.tense}`).item;
    }
    return pickSmart('verbs', combos, c => `${c.verb.inf}:${c.person}:${c.tense}`).item;
  },

  next() {
    clearTimeout(this.state.timer);
    const combo = this.pick();
    this.state.currentCombo = combo;
    this.state.attempts = 0;
    this.state.recorded = false;
    this.state.revealed = false;
    document.getElementById('verb-display').textContent = combo.verb.inf;
    document.getElementById('verb-tense').textContent = this.TENSE_LABELS[combo.tense];
    document.getElementById('verb-meaning').textContent = combo.verb.en;
    document.getElementById('verb-cat').textContent = this.catNote(combo.verb);
    document.getElementById('person-display').textContent = this.PERSON_LABELS[combo.person];
    this.applyVisibility();
    const input = document.getElementById('answer-input');
    input.value = ''; input.focus();
    document.getElementById('feedback-area').innerHTML = '';
    document.getElementById('submit-btn').textContent = 'Check';
    this.state.awaitingNext = false;
  },

  advance() {
    clearTimeout(this.state.timer);
    this.next();
    this.refreshStatsBlock();
  },

  check() {
    if (this.state.awaitingNext) { this.advance(); return; }
    const input = document.getElementById('answer-input').value.trim();
    if (!input) return;
    const c = this.state.currentCombo;
    const expected = c.verb.conj[c.tense][c.person];
    const key = `${c.verb.inf}:${c.person}:${c.tense}`;
    const nu = normalize(input), ne = normalize(expected);
    const exact = input.toLowerCase() === expected.toLowerCase();
    const near = !exact && nu === ne;

    if (exact || near) {
      if (!this.state.recorded) { recordResult('verbs', key, true); this.state.recorded = true; }
      this.state.revealed = true;
      this.applyVisibility();
      const note = near
        ? `<div class="feedback almost">Nearly. The accent matters: <strong>${expected}</strong>.${accentTrapNote(expected)}</div>`
        : `<div class="feedback correct">✓ Correct: <strong>${expected}</strong></div>`;
      document.getElementById('feedback-area').innerHTML = note +
        `<div class="autoadvance">${c.verb.inf} = ${c.verb.en}. Next in a moment…</div>`;
      document.getElementById('submit-btn').textContent = 'Next';
      this.state.awaitingNext = true;
      this.state.timer = setTimeout(() => { if (this.state.awaitingNext) this.advance(); }, 2800);
      return;
    }

    // wrong
    this.state.attempts++;
    if (!this.state.recorded) { recordResult('verbs', key, false); this.state.recorded = true; }
    if (this.state.attempts < 2) {
      document.getElementById('feedback-area').innerHTML =
        `<div class="feedback incorrect">✗ Not quite, try again.</div>` +
        `<div class="hint-row"><button class="hint-btn" id="verb-hint-btn">Show a hint</button><span class="hint-text hidden" id="verb-hint">${this.catNote(c.verb)} Starts with "${expected.slice(0,1)}", ${expected.length} letters.</span></div>`;
      const hb = document.getElementById('verb-hint-btn');
      hb.addEventListener('click', () => { document.getElementById('verb-hint').classList.remove('hidden'); hb.classList.add('hidden'); });
      const inp = document.getElementById('answer-input');
      inp.focus(); inp.select();
    } else {
      this.state.revealed = true;
      this.applyVisibility();
      document.getElementById('feedback-area').innerHTML =
        `<div class="feedback incorrect">✗ The correct form is <strong>${expected}</strong>. ${this.catNote(c.verb)}</div>`;
      document.getElementById('submit-btn').textContent = 'Next';
      this.state.awaitingNext = true;
    }
  }
};

      });
    }
    this.state.awaitingNext = true;
  },

  refreshStatsBlock() {
    const block = document.getElementById('stats-block');
    if (block) block.outerHTML = this.renderStatsBlock();
  }
};

Games.sentenceBuilder = {
  name: 'Sentence Builder',
  description: 'Tap word tiles to construct the Spanish sentence',
  state: { diff: 'easy', awaitingNext: false, current: null, placed: [], bank: [] },

  // Subject pronouns that Spanish routinely drops (normalized, no accents).
  PRONOUNS: new Set(['yo','tu','el','ella','usted','nosotros','nosotras','vosotros','vosotras','ellos','ellas','ustedes']),
  TRAP_COUNT: { easy: 1, medium: 2, hard: 3 },

  init() {
    this.state = { diff: this.state.diff || 'easy', awaitingNext: false, current: null, placed: [], bank: [], marks: [], recorded: false };
    this.trapPool = this.buildTrapPool();
    document.getElementById('main').innerHTML = `
      <div class="controls">
        <span class="controls-caption">Difficulty</span>
        <button class="filter-btn active" data-diff="easy">Easy</button>
        <button class="filter-btn" data-diff="medium">Medium</button>
        <button class="filter-btn" data-diff="hard">Hard</button>
      </div>
      <div class="prompt-card">
        <div class="prompt-ask">Translate to Spanish:</div>
        <div class="prompt-main" id="sb-english">—</div>
      </div>
      <div class="tile-target" id="sb-target"></div>
      <div class="tile-bank" id="sb-bank"></div>
      <div class="sb-hint">Tap a word to add it. Drag placed words to reorder; tap a placed word to remove it.</div>
      <div class="input-row">
        <button class="primary" id="sb-check" style="flex:1;">Check</button>
        <button class="primary" id="sb-clear" style="background:#7a7466;">Clear</button>
      </div>
      <div id="feedback-area"></div>
      ${this.renderStatsBlock()}
    `;
    document.querySelectorAll('[data-diff]').forEach(b => b.addEventListener('click', () => this.setDiff(b.dataset.diff)));
    document.getElementById('sb-check').addEventListener('click', () => this.check());
    document.getElementById('sb-clear').addEventListener('click', () => this.clear());
    this.syncDiff();
    this.next();
  },

  syncDiff() {
    document.querySelectorAll('[data-diff]').forEach(b => b.classList.toggle('active', b.dataset.diff === this.state.diff));
  },

  setDiff(diff) {
    this.state.diff = diff;
    this.syncDiff();
    this.next();
    this.refreshStatsBlock();
  },

  renderStatsBlock() {
    const s = gameAggregateStats('sentenceBuilder');
    const acc = s.total > 0 ? Math.round((s.correct/s.total)*100) + '%' : '—';
    return `<div class="game-stats" id="stats-block">
      <div class="stats-row"><span>Attempts</span><strong>${s.total}</strong></div>
      <div class="stats-row"><span>Accuracy</span><strong>${acc}</strong></div>
    </div>`;
  },

  wordsOf(str) {
    return str.replace(/[.,!?¿¡;:]/g, '').split(/\s+/).filter(Boolean);
  },

  buildTrapPool() {
    const map = new Map();
    DATA.sentences.forEach(s => this.wordsOf(s.es).forEach(w => {
      const n = normalize(w);
      if (!map.has(n)) map.set(n, w.toLowerCase());
    }));
    return [...map.values()];
  },

  poolForDiff() {
    const d = this.state.diff;
    const pool = DATA.sentences.filter(s => {
      const n = this.wordsOf(s.es).length;
      if (d === 'easy') return n <= 4;
      if (d === 'medium') return n >= 5 && n <= 7;
      return n >= 8;
    });
    return pool.length ? pool : DATA.sentences;
  },

  next() {
    const sentence = pickSmart('sentenceBuilder', this.poolForDiff(), s => s.es).item;
    this.state.current = sentence;
    document.getElementById('sb-english').textContent = sentence.en;
    const answerWords = this.wordsOf(sentence.es);
    const answerNorms = new Set(answerWords.map(w => normalize(w)));
    const trapCount = this.TRAP_COUNT[this.state.diff] || 1;
    const candidates = this.trapPool.filter(w => !answerNorms.has(normalize(w)));
    const traps = shuffle(candidates).slice(0, trapCount);
    const all = answerWords.map(w => ({ word: w, trap: false }))
      .concat(traps.map(w => ({ word: w, trap: true })));
    this.state.bank = shuffle(all.map((t, i) => ({ word: t.word, id: i, used: false, trap: t.trap })));
    this.state.placed = [];
    this.state.marks = [];
    this.state.recorded = false;
    this.renderTiles();
    document.getElementById('feedback-area').innerHTML = '';
    document.getElementById('sb-check').textContent = 'Check';
    this.state.awaitingNext = false;
  },

  renderTiles() {
    const target = document.getElementById('sb-target');
    target.innerHTML = this.state.placed.length === 0
      ? '<span style="color:#7a7466; font-style:italic;">Tap tiles below to build the sentence</span>'
      : this.state.placed.map((t, idx) => {
          const mk = this.state.marks && this.state.marks[idx];
          const cls = mk === 'wrong' ? ' wrong' : mk === 'misplaced' ? ' misplaced' : '';
          return `<button class="tile placed${cls}" data-placed-idx="${idx}">${t.word}</button>`;
        }).join('');
    target.querySelectorAll('[data-placed-idx]').forEach(el => {
      el.addEventListener('pointerdown', e => this.onPointerDown(e, parseInt(el.dataset.placedIdx), el));
    });
    const bank = document.getElementById('sb-bank');
    bank.innerHTML = this.state.bank.filter(t => !t.used).map(t => `<button class="tile" data-bank-id="${t.id}">${t.word}</button>`).join('');
    bank.querySelectorAll('[data-bank-id]').forEach(el => {
      el.addEventListener('click', () => { if (!this.state.awaitingNext) this.place(parseInt(el.dataset.bankId)); });
    });
  },

  // Pointer drag: no movement past a small threshold counts as a tap (remove);
  // movement reorders the tile to wherever it's dropped. Works for mouse and touch.
  onPointerDown(e, idx, el) {
    if (this.state.awaitingNext) return;
    e.preventDefault();
    const startX = e.clientX, startY = e.clientY;
    let moved = false;
    try { el.setPointerCapture(e.pointerId); } catch (err) {}
    const move = ev => {
      if (!moved && (Math.abs(ev.clientX - startX) > 6 || Math.abs(ev.clientY - startY) > 6)) {
        moved = true; el.classList.add('dragging');
      }
    };
    const up = ev => {
      el.removeEventListener('pointermove', move);
      el.removeEventListener('pointerup', up);
      el.classList.remove('dragging');
      if (!moved) { this.unplace(idx); return; }
      this.moveTile(idx, this.dropIndex(ev.clientX));
    };
    el.addEventListener('pointermove', move);
    el.addEventListener('pointerup', up);
  },

  dropIndex(clientX) {
    const tiles = [...document.querySelectorAll('#sb-target [data-placed-idx]')];
    for (let i = 0; i < tiles.length; i++) {
      const r = tiles[i].getBoundingClientRect();
      if (clientX < r.left + r.width / 2) return i;
    }
    return tiles.length;
  },

  moveTile(from, to) {
    const arr = this.state.placed;
    const [t] = arr.splice(from, 1);
    let idx = to > from ? to - 1 : to;
    if (idx < 0) idx = 0;
    if (idx > arr.length) idx = arr.length;
    arr.splice(idx, 0, t);
    this.state.marks = [];
    this.renderTiles();
  },

  place(id) {
    const tile = this.state.bank.find(t => t.id === id);
    if (!tile || tile.used) return;
    tile.used = true;
    this.state.placed.push(tile);
    this.state.marks = [];
    this.renderTiles();
  },

  unplace(idx) {
    const tile = this.state.placed[idx];
    if (!tile) return;
    tile.used = false;
    this.state.placed.splice(idx, 1);
    this.state.marks = [];
    this.renderTiles();
  },

  clear() {
    if (this.state.awaitingNext) return;
    this.state.placed.forEach(t => { t.used = false; });
    this.state.placed = [];
    this.state.marks = [];
    this.renderTiles();
  },

  acceptedVariants(sentence) {
    const base = this.wordsOf(sentence.es);
    const variants = [base];
    if (base.length > 1 && this.PRONOUNS.has(normalize(base[0]))) variants.push(base.slice(1));
    (sentence.alt || []).forEach(a => variants.push(this.wordsOf(a)));
    return variants;
  },

  acceptedAnswers(sentence) {
    return this.acceptedVariants(sentence).map(v => normalize(v.join(' ')));
  },

  // Classify each placed tile against the closest accepted answer:
  //   'ok'        right word, right place
  //   'misplaced' right word, wrong place (yellow)
  //   'wrong'     word not in the answer / surplus (red)
  // Uses a longest-common-subsequence so a single stray word doesn't cascade
  // and mark the rest of an otherwise-correct sentence.
  classifyTiles(builtWords) {
    const b = builtWords.map(w => normalize(w));
    let best = null, bestOk = -1;
    this.acceptedVariants(this.state.current).forEach(v => {
      const marks = this.classifyAgainst(b, v.map(w => normalize(w)));
      const ok = marks.filter(m => m === 'ok').length;
      if (ok > bestOk) { bestOk = ok; best = marks; }
    });
    return best || b.map(() => 'wrong');
  },

  classifyAgainst(b, t) {
    const m = b.length, n = t.length;
    const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
    for (let i = m - 1; i >= 0; i--)
      for (let j = n - 1; j >= 0; j--)
        dp[i][j] = b[i] === t[j] ? dp[i + 1][j + 1] + 1 : Math.max(dp[i + 1][j], dp[i][j + 1]);
    const inLcs = new Set();
    let i = 0, j = 0;
    while (i < m && j < n) {
      if (b[i] === t[j]) { inLcs.add(i); i++; j++; }
      else if (dp[i + 1][j] >= dp[i][j + 1]) i++;
      else j++;
    }
    const remaining = new Map();
    t.forEach(w => remaining.set(w, (remaining.get(w) || 0) + 1));
    inLcs.forEach(idx => remaining.set(b[idx], (remaining.get(b[idx]) || 0) - 1));
    return b.map((w, idx) => {
      if (inLcs.has(idx)) return 'ok';
      const c = remaining.get(w) || 0;
      if (c > 0) { remaining.set(w, c - 1); return 'misplaced'; }
      return 'wrong';
    });
  },

  check() {
    if (this.state.awaitingNext) { this.next(); this.refreshStatsBlock(); return; }
    if (this.state.placed.length === 0) return;
    const builtWords = this.state.placed.map(t => t.word);
    const builtNorm = normalize(builtWords.join(' '));
    const sentence = this.state.current;
    const accepted = this.acceptedAnswers(sentence);
    const base = this.wordsOf(sentence.es);
    const droppedPronoun = base.length > 1 && this.PRONOUNS.has(normalize(base[0]));

    if (accepted.includes(builtNorm)) {
      if (!this.state.recorded) { recordResult('sentenceBuilder', sentence.es, true); this.state.recorded = true; }
      this.state.marks = [];
      this.renderTiles();
      let note = '';
      if (droppedPronoun && builtNorm === normalize(base.slice(1).join(' '))) {
        note = ` <span style="color:#7a7466">(you can also include "${base[0]}")</span>`;
      }
      document.getElementById('feedback-area').innerHTML = `<div class="feedback correct">✓ <strong>${sentence.es}</strong>${note}</div>`;
      document.getElementById('sb-check').textContent = 'Next';
      this.state.awaitingNext = true;
      return;
    }

    // Wrong: keep the round open so the player fixes the sentence instead of moving on.
    if (!this.state.recorded) { recordResult('sentenceBuilder', sentence.es, false); this.state.recorded = true; }
    this.state.marks = this.classifyTiles(builtWords);
    this.renderTiles();
    const hasYellow = this.state.marks.includes('misplaced');
    const hasRed = this.state.marks.includes('wrong');
    let legend = 'Fix them and check again.';
    if (hasRed && hasYellow) legend = 'Red words don’t belong; yellow words are the right word in the wrong place. Fix them and check again.';
    else if (hasRed) legend = 'The red words don’t belong here. Fix them and check again.';
    else if (hasYellow) legend = 'The yellow words are right but in the wrong place. Reorder them and check again.';
    document.getElementById('feedback-area').innerHTML =
      `<div class="feedback incorrect">✗ Not quite. ${legend}</div>` +
      `<div class="hint-row"><button class="hint-btn" id="sb-reveal">Show answer</button></div>`;
    document.getElementById('sb-reveal').addEventListener('click', () => this.reveal());
    // awaitingNext stays false, button stays "Check" so they can re-check after fixing
  },

  reveal() {
    this.state.marks = [];
    this.renderTiles();
    document.getElementById('feedback-area').innerHTML =
      `<div class="feedback incorrect">Answer: <strong>${this.state.current.es}</strong>.</div>`;
    document.getElementById('sb-check').textContent = 'Next';
    this.state.awaitingNext = true;
  },

  refreshStatsBlock() {
    const block = document.getElementById('stats-block');
    if (block) block.outerHTML = this.renderStatsBlock();
  }
};

// --- 6. TIME & NUMBERS ---
Games.numbers = {
  name: 'Numbers',
  description: 'Say numbers, prices, ages and years in Spanish',
  state: { current: null, itemKey: null, awaitingNext: false, diff: 'medium' },

  init() {
    this.state = { current: null, itemKey: null, awaitingNext: false, diff: 'medium' };
    document.getElementById('main').innerHTML = `
      <div class="controls">
        <button class="filter-btn" data-diff="easy">Easy</button>
        <button class="filter-btn active" data-diff="medium">Medium</button>
        <button class="filter-btn" data-diff="hard">Hard</button>
      </div>
      <div class="prompt-card">
        <div class="prompt-ask" id="num-ask">—</div>
        <div class="prompt-main" id="num-display">—</div>
      </div>
      <div class="input-row">
        <input type="text" id="num-input" placeholder="Type it in Spanish words" autocomplete="off" autocapitalize="off" spellcheck="false">
        <button class="primary" id="num-submit">Check</button>
      </div>
      ${accentBar('num-input')}
      <div id="feedback-area"></div>
      ${this.renderStatsBlock()}
    `;
    wireAccentBar(document.getElementById('main'));
    document.querySelectorAll('[data-diff]').forEach(b => b.addEventListener('click', () => this.setDiff(b.dataset.diff)));
    document.getElementById('num-submit').addEventListener('click', () => this.check());
    document.getElementById('num-input').addEventListener('keydown', e => { if (e.key==='Enter') { e.preventDefault(); this.check(); }});
    this.next();
  },

  setDiff(d) {
    this.state.diff = d;
    document.querySelectorAll('[data-diff]').forEach(b => b.classList.toggle('active', b.dataset.diff === d));
    this.next();
  },

  renderStatsBlock() {
    const s = gameAggregateStats('numbers');
    const acc = s.total > 0 ? Math.round((s.correct/s.total)*100) + '%' : '—';
    return `<div class="game-stats" id="stats-block">
      <div class="stats-row"><span>Attempts</span><strong>${s.total}</strong></div>
      <div class="stats-row"><span>Accuracy</span><strong>${acc}</strong></div>
    </div>`;
  },

  // apocopate a number in a masculine-noun context: uno->un, veintiuno->veintiún.
  apoc(s) { return s.replace(/veintiuno$/, 'veintiún').replace(/(^|\s)uno$/, '$1un'); },

  // Randomly generate a number in one of several real-world contexts.
  generate() {
    const rnd = (a, b) => a + Math.floor(Math.random() * (b - a + 1));
    const d = this.state.diff;
    const contexts = d === 'easy' ? ['plain', 'age']
                   : d === 'medium' ? ['plain', 'age', 'price']
                   : ['plain', 'price', 'age', 'year'];
    const c = pickSmart('numbers', contexts.map(x => ({ x })), o => o.x).item.x;
    let display, ask, expected;
    if (c === 'plain') {
      const n = d === 'easy' ? rnd(0, 30) : d === 'medium' ? rnd(0, 100) : rnd(0, 9999);
      display = String(n); ask = 'Say this number in Spanish:'; expected = numberToSpanish(n);
    } else if (c === 'price') {
      const e = d === 'medium' ? rnd(1, 100) : rnd(1, 999);
      const cents = d === 'hard' && Math.random() < 0.6 ? rnd(1, 99) : 0;
      display = cents ? `${e},${String(cents).padStart(2, '0')} €` : `${e} €`;
      ask = '¿Cuánto cuesta? Say the price:';
      const eWord = e === 1 ? 'un euro' : this.apoc(numberToSpanish(e)) + ' euros';
      expected = eWord + (cents ? ' con ' + numberToSpanish(cents) : '');
    } else if (c === 'age') {
      const a = d === 'easy' ? rnd(1, 30) : rnd(1, 99);
      display = `${a} años`; ask = '¿Cuántos años tiene? Say the number:'; expected = this.apoc(numberToSpanish(a));
    } else {
      const y = rnd(1000, 2099);
      display = `año ${y}`; ask = 'Say the year:'; expected = numberToSpanish(y);
    }
    return { key: c, display, ask, expected };
  },

  next() {
    const item = this.generate();
    this.state.current = item;
    this.state.itemKey = item.key;
    document.getElementById('num-ask').textContent = item.ask;
    document.getElementById('num-display').textContent = item.display;
    const input = document.getElementById('num-input');
    input.value = ''; input.focus();
    document.getElementById('feedback-area').innerHTML = '';
    document.getElementById('num-submit').textContent = 'Check';
    this.state.awaitingNext = false;
  },

  check() {
    if (this.state.awaitingNext) { this.next(); this.refreshStatsBlock(); return; }
    const input = document.getElementById('num-input').value.trim();
    if (!input) return;
    const c = this.state.current;
    let fb;
    if (numAccept(input, c.expected)) {
      recordResult('numbers', this.state.itemKey, true);
      fb = `<div class="feedback correct">✓ <strong>${c.expected}</strong></div>`;
    } else {
      recordResult('numbers', this.state.itemKey, false);
      fb = `<div class="feedback incorrect">✗ Answer: <strong>${c.expected}</strong>. You wrote "<em>${input}</em>".</div>`;
    }
    document.getElementById('feedback-area').innerHTML = fb;
    document.getElementById('num-submit').textContent = 'Next';
    this.state.awaitingNext = true;
  },

  refreshStatsBlock() {
    const block = document.getElementById('stats-block');
    if (block) block.outerHTML = this.renderStatsBlock();
  }
};

Games.placeAction = {
  name: 'Place Match',
  description: "Pick the places where each verb fits",
  state: { awaitingNext: false, current: null, selected: new Set(), shown: [] },

  init() {
    this.state = { awaitingNext: false, current: null, selected: new Set(), shown: [] };
    document.getElementById('main').innerHTML = `
      <div class="prompt-card">
        <div class="prompt-ask">Where might you do this?</div>
        <div class="prompt-main" id="pa-verb">—</div>
      </div>
      <div class="hint-row" id="pa-hint-row">
        <button class="hint-btn">Show meaning</button>
        <span class="hint-text hidden" id="pa-english"></span>
      </div>
      <div class="check-grid" id="pa-grid"></div>
      <div class="input-row">
        <button class="primary" id="pa-check" style="flex:1;">Check selection</button>
      </div>
      <div id="feedback-area"></div>
      ${this.renderStatsBlock()}
    `;
    document.getElementById('pa-check').addEventListener('click', () => this.check());
    this.next();
  },

  renderStatsBlock() {
    const s = gameAggregateStats('placeAction');
    const acc = s.total > 0 ? Math.round((s.correct/s.total)*100) + '%' : '—';
    return `<div class="game-stats" id="stats-block">
      <div class="stats-row"><span>Attempts</span><strong>${s.total}</strong></div>
      <div class="stats-row"><span>Accuracy</span><strong>${acc}</strong></div>
    </div>`;
  },

  next() {
    const entry = pickSmart('placeAction', DATA.placeActions, p => p.verb).item;
    this.state.current = entry;
    this.state.selected = new Set();
    document.getElementById('pa-verb').textContent = entry.verb;
    document.getElementById('pa-english').textContent = entry.en;
    document.getElementById('pa-english').classList.add('hidden');
    document.getElementById('pa-hint-row').querySelector('.hint-btn').classList.remove('hidden');
    const distractors = shuffle(DATA.allPlaces.filter(p => !entry.places.includes(p))).slice(0, 6);
    this.state.shown = shuffle([...entry.places, ...distractors]);
    this.renderGrid();
    document.getElementById('feedback-area').innerHTML = '';
    document.getElementById('pa-check').textContent = 'Check selection';
    this.state.awaitingNext = false;
  },

  renderGrid() {
    const grid = document.getElementById('pa-grid');
    grid.innerHTML = this.state.shown.map(p => `<button class="check-item${this.state.selected.has(p) ? ' selected' : ''}" data-place="${p}">${p}</button>`).join('');
    grid.querySelectorAll('[data-place]').forEach(b => {
      b.addEventListener('click', () => {
        if (this.state.awaitingNext) return;
        const p = b.dataset.place;
        if (this.state.selected.has(p)) this.state.selected.delete(p);
        else this.state.selected.add(p);
        this.renderGrid();
      });
    });
  },

  check() {
    if (this.state.awaitingNext) { this.next(); this.refreshStatsBlock(); return; }
    const correct = new Set(this.state.current.places);
    const chosen = this.state.selected;
    const truePos = [...correct].filter(p => chosen.has(p));
    const falsePos = [...chosen].filter(p => !correct.has(p));
    const missed = [...correct].filter(p => !chosen.has(p));
    const perfect = truePos.length === correct.size && falsePos.length === 0;
    const grid = document.getElementById('pa-grid');
    grid.innerHTML = this.state.shown.map(p => {
      let cls = 'check-item';
      if (correct.has(p) && chosen.has(p)) cls += ' true-positive';
      else if (!correct.has(p) && chosen.has(p)) cls += ' false-positive';
      else if (correct.has(p) && !chosen.has(p)) cls += ' missed';
      return `<button class="${cls}" disabled>${p}</button>`;
    }).join('');
    recordResult('placeAction', this.state.current.verb, perfect);
    let fb;
    if (perfect) fb = `<div class="feedback correct">✓ All correct.</div>`;
    else {
      const bits = [];
      if (falsePos.length) bits.push(`extras you picked: ${falsePos.join(', ')}`);
      if (missed.length) bits.push(`places you missed: ${missed.join(', ')}`);
      fb = `<div class="feedback incorrect">✗ ${bits.join('; ')}.</div>`;
    }
    document.getElementById('feedback-area').innerHTML = fb;
    document.getElementById('pa-check').textContent = 'Next';
    this.state.awaitingNext = true;
  },

  refreshStatsBlock() {
    const block = document.getElementById('stats-block');
    if (block) block.outerHTML = this.renderStatsBlock();
  }
};

// --- 8. DIALOGUE REPLAY ---
Games.dialogue = {
  name: 'Dialogue Replay',
  description: 'Play one role in a Spanish conversation',
  state: { current: null, turnIdx: 0, awaitingNext: false },

  init() {
    this.state = { current: null, turnIdx: 0, awaitingNext: false };
    if (DATA.dialogues.length === 0) {
      document.getElementById('main').innerHTML = `<div class="empty-state">No dialogues in the database yet. Add one to DATA.dialogues to enable this game.</div>`;
      return;
    }
    if (DATA.dialogues.length === 1) {
      this.startDialogue(DATA.dialogues[0]);
    } else {
      document.getElementById('main').innerHTML = `
        <div class="prompt-card">
          <div class="prompt-ask">Pick a dialogue:</div>
        </div>
        <div class="games-grid" id="d-list"></div>
      `;
      const list = document.getElementById('d-list');
      list.innerHTML = DATA.dialogues.map(d => `<button class="game-card" data-id="${d.id}">
        <div class="game-card-title">${d.name}</div>
        <div class="game-card-desc">${d.description}</div>
        <div class="game-card-stats">Play as ${d.userRole}</div>
      </button>`).join('');
      list.querySelectorAll('[data-id]').forEach(b => b.addEventListener('click', () => {
        const d = DATA.dialogues.find(x => x.id === b.dataset.id);
        this.startDialogue(d);
      }));
    }
  },

  startDialogue(d) {
    this.state.current = d;
    this.state.turnIdx = 0;
    document.getElementById('main').innerHTML = `
      <div class="prompt-card">
        <div class="prompt-meta">${d.name} • You are ${d.userRole}</div>
      </div>
      <div id="d-history"></div>
      <div id="d-current"></div>
      <div id="feedback-area"></div>
      ${this.renderStatsBlock()}
    `;
    this.renderTurn();
  },

  renderStatsBlock() {
    const s = gameAggregateStats('dialogue');
    const acc = s.total > 0 ? Math.round((s.correct/s.total)*100) + '%' : '—';
    return `<div class="game-stats" id="stats-block">
      <div class="stats-row"><span>Attempts</span><strong>${s.total}</strong></div>
      <div class="stats-row"><span>Accuracy</span><strong>${acc}</strong></div>
    </div>`;
  },

  renderTurn() {
    const d = this.state.current;
    const history = document.getElementById('d-history');
    history.innerHTML = d.turns.slice(0, this.state.turnIdx).map(t => `
      <div class="dialogue-turn ${t.speaker === d.userRole ? 'you' : 'other'}">
        <div class="dialogue-speaker">${t.speaker}</div>
        <div class="dialogue-text">${t.es}</div>
      </div>
    `).join('');

    if (this.state.turnIdx >= d.turns.length) {
      document.getElementById('d-current').innerHTML = `<div class="feedback correct">✓ Dialogue complete.</div>
        <div style="margin-top:0.5rem;"><button class="primary" id="d-restart">Restart</button></div>`;
      document.getElementById('d-restart').addEventListener('click', () => this.startDialogue(d));
      return;
    }

    const turn = d.turns[this.state.turnIdx];
    const isUser = turn.speaker === d.userRole;
    if (isUser) {
      document.getElementById('d-current').innerHTML = `
        <div class="dialogue-turn you">
          <div class="dialogue-speaker">Your turn (${d.userRole})</div>
          <div class="dialogue-english">"${turn.en}"</div>
        </div>
        <div class="input-row">
          <input type="text" id="d-input" placeholder="Type your line in Spanish" autocomplete="off" autocapitalize="off" spellcheck="false">
          <button class="primary" id="d-submit">Say it</button>
        </div>
        ${accentBar('d-input')}`;
      wireAccentBar(document.getElementById('d-current'));
      const input = document.getElementById('d-input');
      input.focus();
      input.addEventListener('keydown', e => { if (e.key==='Enter') { e.preventDefault(); this.checkLine(); }});
      document.getElementById('d-submit').addEventListener('click', () => this.checkLine());
    } else {
      // Auto-advance after a brief moment for other speaker's turns
      document.getElementById('d-current').innerHTML = `
        <div class="dialogue-turn other">
          <div class="dialogue-speaker">${turn.speaker}</div>
          <div class="dialogue-text">${turn.es}</div>
        </div>
        <div class="hint-row">
          <button class="hint-btn">Show meaning</button>
          <span class="hint-text hidden">${turn.en}</span>
        </div>
        <div style="margin-top:0.5rem;"><button class="primary" id="d-continue">Continue</button></div>`;
      document.getElementById('d-continue').addEventListener('click', () => {
        this.state.turnIdx++;
        this.renderTurn();
      });
    }
  },

  checkLine() {
    const input = document.getElementById('d-input').value.trim();
    if (!input) return;
    const turn = this.state.current.turns[this.state.turnIdx];
    const expected = turn.es;
    const nu = normalize(input), ne = normalize(expected);
    let fb, correct = false;
    if (input.toLowerCase() === expected.toLowerCase()) {
      correct = true;
      fb = `<div class="feedback correct">✓ <strong>${expected}</strong></div>`;
    } else if (nu === ne) {
      correct = true;
      fb = `<div class="feedback almost">Nearly. Watch accents/punctuation: <strong>${expected}</strong>.${accentTrapNote(expected)}</div>`;
    } else {
      fb = `<div class="feedback incorrect">✗ Expected: <strong>${expected}</strong>. You wrote: <em>${input}</em>.</div>`;
    }
    recordResult('dialogue', `${this.state.current.id}:${this.state.turnIdx}`, correct);
    document.getElementById('feedback-area').innerHTML = fb + `<div style="margin-top:0.5rem;"><button class="primary" id="d-advance">Continue</button></div>`;
    document.getElementById('d-advance').addEventListener('click', () => {
      this.state.turnIdx++;
      document.getElementById('feedback-area').innerHTML = '';
      this.renderTurn();
      this.refreshStatsBlock();
    });
  },

  _pool: null,

  // Build the unified word pool. Lazy/cached.
  buildPool() {
    if (this._pool) return this._pool;
    const pool = [];
    const seen = Object.create(null);

    // Article gender lookup
    const articleMap = Object.create(null);
    DATA.articleNouns.forEach(an => articleMap[an.noun.toLowerCase()] = an.article);

    // From vocab
    Object.entries(DATA.vocab).forEach(([topic, items]) => {
      const wordType = this.TYPE_BY_TOPIC[topic] || 'word';
      items.forEach(item => {
        const key = item.es.toLowerCase();
        if (seen[key]) return;
        seen[key] = true;
        const entry = { es: item.es, en: item.en, type: wordType, topic };
        if (wordType === 'noun' && articleMap[key]) {
          entry.article = articleMap[key];
          entry.gender = articleMap[key] === 'el' ? 'm' : 'f';
        }
        pool.push(entry);
      });
    });

    // From articleNouns (catch ones missed by vocab — they get type 'noun')
    DATA.articleNouns.forEach(an => {
      const key = an.noun.toLowerCase();
      if (seen[key]) return;
      seen[key] = true;
      pool.push({
        es: an.noun,
        en: '(see article quiz)', // placeholder — these don't all have English glosses
        type: 'noun',
        article: an.article,
        gender: an.article === 'el' ? 'm' : 'f'
      });
    });

    // From verbs
    DATA.verbs.forEach(v => {
      const key = v.inf.toLowerCase();
      if (seen[key]) return;
      seen[key] = true;
      pool.push({
        es: v.inf,
        en: v.en,
        type: 'verb',
        cat: v.cat,
        sampleYo: v.conj.present.yo,
        conj: v.conj
      });
    });

    this._pool = pool;
    return pool;
  },

  // Look up a single word for sentence parsing.
  // Tries function words, exact match, conjugated verb forms, plurals, and adjective agreement.
  lookupWord(rawWord) {
    const w = rawWord.toLowerCase()
      .replace(/[.,;:!?¿¡()"]/g, '')
      .trim();
    if (!w) return null;

    // Pure-digit check (e.g. "1995"): skip
    if (/^\d+$/.test(w)) return { es: rawWord, en: rawWord, type: 'number' };

    // Function words
    if (this.FUNCTION_WORDS[w]) {
      const fw = this.FUNCTION_WORDS[w];
      return { es: w, en: fw.en, type: 'function', meta: fw.meta };
    }

    // Match without accents (so "está" and "esta" both find it)
    const wn = normalize(w);
    if (this.FUNCTION_WORDS[wn]) {
      const fw = this.FUNCTION_WORDS[wn];
      return { es: w, en: fw.en, type: 'function', meta: fw.meta };
    }

    const pool = this.buildPool();
    // Exact match in pool
    let entry = pool.find(p => normalize(p.es) === wn);
    if (entry) return entry;

    // Conjugated verb form — search through all verbs' conjugations.
    // For reflexives the stored form includes "me/te/se/" — also try matching
    // without that prefix (so "levanto" finds the yo form of "levantarse").
    for (const v of DATA.verbs) {
      for (const tenseKey of Object.keys(v.conj)) {
        const tense = v.conj[tenseKey];
        for (const person of Object.keys(tense)) {
          const form = tense[person];
          const formNorm = normalize(form);
          const formStripped = formNorm.replace(/^(me|te|se|nos|os) /, '');
          if (formNorm === wn || formStripped === wn) {
            return {
              es: w,
              en: v.en,
              type: 'verb-form',
              infinitive: v.inf,
              person: person,
              tense: tenseKey,
              cat: v.cat
            };
          }
        }
      }
    }

    // Number text (cinco, treinta, etc.)
    for (const n of DATA.numbers) {
      if (normalize(n.es) === wn) {
        return { es: w, en: String(n.num), type: 'number', meta: 'number word' };
      }
    }

    // Reflexive form: split off pronoun prefix and try again
    // e.g. "duchame" rare, but "ducharse" should match base verb "ducharse"
    for (const pn of ['me ','te ','se ','nos ','os ']) {
      if (w.startsWith(pn)) {
        const rest = w.slice(pn.length);
        const m = this.lookupWord(rest);
        if (m) return { ...m, es: w, note: 'reflexive: ' + pn.trim() + ' ' + rest };
      }
    }

    // Plural -es: "reuniones" → "reunión", "lápices" → "lápiz" (z→c first)
    if (wn.endsWith('es') && wn.length > 3) {
      const sing1 = wn.slice(0, -2);
      const sing2 = sing1.endsWith('c') ? sing1.slice(0, -1) + 'z' : sing1;
      entry = pool.find(p => {
        const pn2 = normalize(p.es);
        return pn2 === sing1 || pn2 === sing2;
      });
      if (entry) return { ...entry, es: w, note: 'plural form' };
    }
    // Plural -s
    if (wn.endsWith('s') && wn.length > 2) {
      const sing = wn.slice(0, -1);
      entry = pool.find(p => normalize(p.es) === sing);
      if (entry) return { ...entry, es: w, note: 'plural form' };
    }

    // Adjective gender variants: bonita → bonito, bonitos → bonito, bonitas → bonito
    const variants = [];
    if (wn.endsWith('a') && wn.length > 2) variants.push(wn.slice(0, -1) + 'o');
    if (wn.endsWith('os') && wn.length > 3) variants.push(wn.slice(0, -2) + 'o');
    if (wn.endsWith('as') && wn.length > 3) variants.push(wn.slice(0, -2) + 'o');
    for (const v of variants) {
      entry = pool.find(p => normalize(p.es) === v);
      if (entry && (entry.type === 'adjective' || entry.type === 'noun')) {
        return { ...entry, es: w, note: 'agreement variant' };
      }
    }

    return null;
  },

    this.state = { mode: 'words', wordFilter: 'all', currentItem: null, revealed: false, activeWordIdx: -1 };

  renderShell() {

    main.querySelectorAll('.recog-mode-toggle .filter-btn').forEach(b =>

  setMode(mode) {
    this.state.mode = mode;
    this.state.revealed = false;
    document.querySelectorAll('.recog-mode-toggle .filter-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.mode === mode)
    );
    this.renderFilters();
    this.next();
  },

  // Word-mode filters (Nouns / Verbs / Weak spots). Hidden in Sentence mode.
  renderFilters() {
    const bar = document.getElementById('recog-filters');
    if (!bar) return;
    if (this.state.mode !== 'words') { bar.innerHTML = ''; return; }
    const f = this.state.wordFilter || 'all';
    const opts = [['all','All'],['nouns','Nouns'],['verbs','Verbs'],['weak','Weak spots']];
    bar.innerHTML = opts.map(o =>
      '<button class="filter-btn' + (f === o[0] ? ' active' : '') + '" data-wfilter="' + o[0] + '">' + o[1] + '</button>'
    ).join('');
    bar.querySelectorAll('[data-wfilter]').forEach(b =>
      b.addEventListener('click', () => this.setWordFilter(b.dataset.wfilter))
    );
  },

  setWordFilter(f) {
    this.state.wordFilter = f;
    this.renderFilters();
    this.next();
  },

  // Keys (es-strings) of word items currently counting as weak spots.
  weakWordKeys() {
    const out = Object.create(null);
    Object.keys(progress.recognition).forEach(k => {
      if (k.indexOf('words|') !== 0) return;
      const s = progress.recognition[k];
      if (!s || typeof s !== 'object' || typeof s.correct !== 'number' || typeof s.incorrect !== 'number') return;
      const t = s.correct + s.incorrect;
      if (t >= 2 && s.correct / t < 0.7) out[k.slice(6)] = true;
    });
    return out;
  },

  renderStatsBlock() {
    const s = gameAggregateStats('recognition');
    const acc = s.total > 0 ? Math.round((s.correct/s.total)*100) + '%' : '—';
    const weak = weakSpotsForGame('recognition', it => {
      const [mode, key] = it.key.split('|');
      return `<span class="weak-spot">${key} • ${mode} (${Math.round(it.acc*100)}%)</span>`;
    });
    return `<div class="game-stats" id="stats-block">
      <div class="stats-row"><span>Attempts</span><strong>${s.total}</strong></div>
      <div class="stats-row"><span>Accuracy</span><strong>${acc}</strong></div>
      <div class="weak-spots-title">Weak spots</div>
      <div>${weak.length ? weak.join('') : (s.total > 0 ? 'None showing yet.' : 'None yet, keep going.')}</div>
    </div>`;
  },

  refreshStatsBlock() {
    const block = document.getElementById('stats-block');
    if (block) block.outerHTML = this.renderStatsBlock();
  },

  next() {
    this.state.revealed = false;
    this.state.activeWordIdx = -1;
    if (this.state.mode === 'words') {
      this.pickWord();
    } else {
      this.pickSentence();
    }
  },

  pickWord() {
    const pool = this.buildPool();
    // Filter out entries with no English meaning (placeholders)
    const base = pool.filter(p => p.en && p.en !== '(see article quiz)');
    const f = this.state.wordFilter || 'all';
    let usable = base;
    if (f === 'nouns') usable = base.filter(p => p.type === 'noun');
    else if (f === 'verbs') usable = base.filter(p => p.type === 'verb');
    else if (f === 'weak') {
      const weak = this.weakWordKeys();
      usable = base.filter(p => weak[p.es]);
    }
    // If a filter yields nothing yet (e.g. no weak spots), fall back to the full set.
    if (!usable.length) usable = base;
    const item = pickWeighted(usable, p => weightForKey('recognition', 'words|' + p.es));
    this.state.currentItem = item;
    this.renderWordCard();
  },

  pickSentence() {
    const item = pickWeighted(DATA.sentences, s => weightForKey('recognition', 'sentences|' + s.es));
    this.state.currentItem = item;
    this.renderSentenceCard();

    card.innerHTML = `
