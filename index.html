      <div class="recog-reveal-area hidden" id="reveal-area"></div>
    `;
    const ctrl = document.getElementById('recog-controls');
    ctrl.innerHTML = `
      <button class="primary" id="reveal-btn">Reveal</button>
    `;
    document.getElementById('reveal-btn').addEventListener('click', () => this.revealWord());
  },

  revealWord() {
    const w = this.state.currentItem;
    this.state.revealed = true;
    const area = document.getElementById('reveal-area');
    area.classList.remove('hidden');
    area.innerHTML = this.formatWordReveal(w);
    const ctrl = document.getElementById('recog-controls');
    ctrl.innerHTML = `
      <div class="rate-row">
        <button class="rate-btn knew" data-rate="knew">Knew it</button>
        <button class="rate-btn fuzzy" data-rate="fuzzy">Fuzzy</button>
        <button class="rate-btn didnt" data-rate="didnt">Didn't know</button>
      </div>
    `;
    ctrl.querySelectorAll('.rate-btn').forEach(b =>
      b.addEventListener('click', () => this.rateWord(b.dataset.rate))
    );
  },

  // Format detailed reveal HTML for a pool entry
  formatWordReveal(w) {
    let meaning = `<div class="recog-meaning">"${w.en}"</div>`;
    let meta = '';
    let sample = '';

    if (w.type === 'noun') {
      const artLabel = w.article ? `${w.article} ${w.es}` : w.es;
      meta = `<div class="recog-meta">Noun${w.gender ? ` · ${w.gender === 'm' ? 'masculine' : 'feminine'}` : ''}${w.topic ? ` · ${w.topic}` : ''}</div>`;
      if (w.article) sample = `<div class="recog-sample">${artLabel} (singular)</div>`;
    } else if (w.type === 'verb') {
      const catLabels = {'reg-ar':'regular -AR','reg-er':'regular -ER','reg-ir':'regular -IR',
        'stem-ie':'E→IE stem-changer','stem-ue':'O→UE stem-changer','stem-i':'E→I stem-changer',
        'irreg':'irregular','reflexive':'reflexive'};
      meta = `<div class="recog-meta">Verb · ${catLabels[w.cat] || w.cat}</div>`;
      if (w.conj && w.conj.present) {
        const p = w.conj.present;
        sample = `<div class="recog-sample">Yo ${p.yo} · Tú ${p.tu} · Él ${p.el}<br>Nos ${p.nos} · Vos ${p.vos} · Ellos ${p.ellos}</div>`;
      }
    } else if (w.type === 'adjective') {
      meta = `<div class="recog-meta">Adjective${w.topic ? ` · ${w.topic}` : ''}</div>`;
      // Show agreement forms if the base ends in -o
      if (w.es.endsWith('o')) {
        const base = w.es.slice(0, -1);
        sample = `<div class="recog-sample">${w.es} (m) · ${base}a (f) · ${w.es}s (m pl) · ${base}as (f pl)</div>`;
      } else if (w.es.endsWith('e') || w.es.endsWith('z') || w.es.endsWith('l')) {
        sample = `<div class="recog-sample">Same form for masculine and feminine. Plural adds -s or -es.</div>`;
      }
    } else if (w.type === 'phrase') {
      meta = `<div class="recog-meta">Phrase${w.topic ? ` · ${w.topic}` : ''}</div>`;
    } else if (w.type === 'place') {
      meta = `<div class="recog-meta">Place name${w.topic ? ` · ${w.topic}` : ''}</div>`;
    }

    return meaning + meta + sample;
  },

  rateWord(rating) {
    const w = this.state.currentItem;
    const key = 'words|' + w.es;
    const correct = rating === 'knew';
    recordResult('recognition', key, correct);
    // "Fuzzy" partially counts: record as incorrect once but also a correct,
    // so it tilts toward "needs review" but less heavily than "didn't know"
    if (rating === 'fuzzy') {
      recordResult('recognition', key, true);
    }
    this.refreshStatsBlock();
    setTimeout(() => this.next(), 200);
  },

  // ---- Sentence mode ----
  renderSentenceCard() {
    const s = this.state.currentItem;
    const card = document.getElementById('recog-card');
    // Split sentence into words+punctuation segments
    const words = s.es.split(/(\s+)/); // keep whitespace as separator
    const chips = words.map((segment, idx) => {
      if (/^\s+$/.test(segment)) return segment;
      return `<span class="word-chip" data-idx="${idx}">${segment}</span>`;
    }).join('');
    card.innerHTML = `
      <div class="recog-sentence">${chips}</div>
      <div id="word-popover-container"></div>
      <div class="recog-reveal-area hidden" id="reveal-area">
        <div class="recog-meaning">"${s.en}"</div>
      </div>
    `;
    card.querySelectorAll('.word-chip').forEach(chip =>
      chip.addEventListener('click', (e) => this.showWordInfo(chip))
    );

    const ctrl = document.getElementById('recog-controls');
    ctrl.innerHTML = `
      <button class="primary" id="reveal-btn">Show full translation</button>
    `;
    document.getElementById('reveal-btn').addEventListener('click', () => this.revealSentence());
  },

  showWordInfo(chip) {
    document.querySelectorAll('.word-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    const word = chip.textContent;
    const entry = this.lookupWord(word);
    const container = document.getElementById('word-popover-container');
    if (!entry) {
      container.innerHTML = `<div class="word-popover">
        <div class="pop-word">${word}</div>
        <div class="pop-meta">Not in dictionary</div>
      </div>`;
      chip.classList.add('unknown');
      return;
    }
    let popMeta = '';
    if (entry.type === 'noun') {
      popMeta = `noun${entry.gender ? ` · ${entry.gender === 'm' ? 'm' : 'f'}` : ''}${entry.note ? ` · ${entry.note}` : ''}`;
    } else if (entry.type === 'verb') {
      const catLabels = {'reg-ar':'reg -AR','reg-er':'reg -ER','reg-ir':'reg -IR',
        'stem-ie':'E→IE stem','stem-ue':'O→UE stem','stem-i':'E→I stem',
        'irreg':'irregular','reflexive':'reflexive'};
      popMeta = `verb (infinitive) · ${catLabels[entry.cat] || entry.cat}`;
    } else if (entry.type === 'verb-form') {
      const catLabels = {'reg-ar':'reg -AR','reg-er':'reg -ER','reg-ir':'reg -IR',
        'stem-ie':'E→IE','stem-ue':'O→UE','stem-i':'E→I',
        'irreg':'irregular','reflexive':'reflexive'};
      popMeta = `${entry.tense || 'present'} of ${entry.infinitive} · ${entry.person} · ${catLabels[entry.cat] || entry.cat}`;
    } else if (entry.type === 'adjective') {
      popMeta = 'adjective' + (entry.note ? ' · ' + entry.note : '');
    } else if (entry.type === 'function') {
      popMeta = entry.meta;
    } else if (entry.type === 'phrase') {
      popMeta = 'phrase';
    } else if (entry.type === 'number') {
      popMeta = entry.meta || 'number';
    } else {
      popMeta = entry.type;
    }
    container.innerHTML = `<div class="word-popover">
      <div class="pop-word">${entry.es} — "${entry.en}"</div>
      <div class="pop-meta">${popMeta}</div>
    </div>`;
  },

  revealSentence() {
    this.state.revealed = true;
    document.getElementById('reveal-area').classList.remove('hidden');
    const ctrl = document.getElementById('recog-controls');
    ctrl.innerHTML = `
      <div class="rate-row binary">
        <button class="rate-btn knew" data-rate="knew">Got it</button>
        <button class="rate-btn didnt" data-rate="didnt">Needed help</button>
      </div>
    `;
    ctrl.querySelectorAll('.rate-btn').forEach(b =>
      b.addEventListener('click', () => this.rateSentence(b.dataset.rate))
    );
  },

  rateSentence(rating) {
    const s = this.state.currentItem;
    const key = 'sentences|' + s.es;
    recordResult('recognition', key, rating === 'knew');
    this.refreshStatsBlock();
    setTimeout(() => this.next(), 200);
  }
};

    return `<div class="game-stats" id="stats-block">
      <div class="stats-row"><span>Attempts</span><strong>${s.total}</strong></div>

    this.state.mode = m;

    document.getElementById('house-ask').textContent =
      m === 'room' ? 'Which room is this?' : 'Name the highlighted object';
    this.next();
  },

  // Accept the answer with or without a leading article, accent-tolerant.
  accepts(answer, expected) {
    const strip = s => normalize(s).replace(/^(el|la|los|las|un|una|unos|unas)\s+/, '').trim();
    return strip(answer) === strip(expected);
  },

  next() {
    const img = document.getElementById('house-img');
    const marker = document.getElementById('house-marker');
    document.getElementById('feedback-area').innerHTML = '';
    document.getElementById('house-missing').classList.add('hidden');
    this.state.awaitingNext = false;

    let scene, obj = null, key;
    if (this.state.mode === 'object') {
      // Flat pool of every object across rooms, deduped by word (via pickSmart) so
      // common items (planta, ventana) aren't over-served, with anti-repeat cooldown.
      const pool = DATA.houseScenes.flatMap(sc => sc.objects.map(o => ({ ...o, scene: sc })));
      const picked = pickSmart('house', pool, o => 'obj:' + o.es);
      obj = picked.item; scene = obj.scene; key = picked.key;
    } else {
      const picked = pickSmart('house', DATA.houseScenes, sc => 'room:' + sc.room.es);
      scene = picked.item; key = picked.key;
    }
    this.state.current = scene;
    this.state.currentObj = obj;
    this.state.itemKey = key;
    if (img.getAttribute('src') !== scene.img) img.src = scene.img;

    if (obj) {
      marker.classList.remove('hidden');
      marker.style.left = (obj.x * 100) + '%';
      marker.style.top = (obj.y * 100) + '%';
      marker.style.width = ((obj.r || 0.06) * 2 * 100) + '%';
      // Flip the English-name label below the ring when the object sits near the top edge.
      marker.classList.toggle('label-below', obj.y < 0.2);
      marker.innerHTML = '<span class="house-marker-label">' + obj.en + '</span>';
    } else {
      marker.classList.add('hidden');
      marker.innerHTML = '';
    }
    this.renderInput();
  },

  renderInput() {
    const area = document.getElementById('house-input-area');
    area.innerHTML = `
      <div class="input-row">
        <input type="text" id="house-input" placeholder="Type in Spanish" autocomplete="off" autocapitalize="off" spellcheck="false">
        <button class="primary" id="house-submit">Check</button>
      </div>
      ${accentBar('house-input')}`;
    wireAccentBar(area);
    const input = document.getElementById('house-input');
    input.focus();
    input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); this.check(input.value.trim()); }});
    document.getElementById('house-submit').addEventListener('click', () => this.check(input.value.trim()));
  },

  check(answer) {
    if (this.state.awaitingNext) { this.next(); this.refreshStatsBlock(); return; }
    if (!answer) return;
    const isRoom = this.state.mode === 'room';
    const expected = isRoom ? this.state.current.room.es : this.state.currentObj.es;
    const en = isRoom ? this.state.current.room.en : this.state.currentObj.en;
    const key = this.state.itemKey;

    let fb;
    const m = answerMatch(answer, expected);
    if (m !== 'no') {
      recordResult('house', key, true);
      if (m === 'exact') {
        fb = `<div class="feedback correct">✓ Correct: <strong>${expected}</strong> (${en})</div>`;
      } else {
        fb = `<div class="feedback almost">Nearly. The accent matters: <strong>${expected}</strong> (${en}).${accentTrapNote(expected)}</div>`;
      }
    } else {
      recordResult('house', key, false);
      fb = `<div class="feedback incorrect">✗ Answer: <strong>${expected}</strong> (${en}). You wrote "<em>${answer}</em>".</div>`;
    }
    document.getElementById('feedback-area').innerHTML =
      fb + `<div style="margin-top:0.5rem;"><button class="primary" id="house-next">Next</button></div>`;
    document.getElementById('house-next').addEventListener('click', () => { this.next(); this.refreshStatsBlock(); });
    this.state.awaitingNext = true;
  },

  refreshStatsBlock() {
    const block = document.getElementById('stats-block');
    if (block) block.outerHTML = this.renderStatsBlock();
  }
};

    const s = gameAggregateStats('clock');

    return `<div class="game-stats" id="stats-block">
      <div class="stats-row"><span>Attempts</span><strong>${s.total}</strong></div>

    this.renderFace();
  },

  clockSVG(display) {
    const [h, m] = display.split(':').map(Number);
    const ha = ((h % 12) + m/60) * 30, ma = m * 6;
    const hand = (angle, len, w, color) => {
      const t = angle * Math.PI/180;
      return `<line x1="100" y1="100" x2="${(100+len*Math.sin(t)).toFixed(1)}" y2="${(100-len*Math.cos(t)).toFixed(1)}" stroke="${color}" stroke-width="${w}" stroke-linecap="round"/>`;
    };
    let ticks = '';
    for (let i = 0; i < 12; i++) {
      const t = i*30 * Math.PI/180;
      ticks += `<line x1="${(100+84*Math.sin(t)).toFixed(1)}" y1="${(100-84*Math.cos(t)).toFixed(1)}" x2="${(100+93*Math.sin(t)).toFixed(1)}" y2="${(100-93*Math.cos(t)).toFixed(1)}" stroke="#1a2332" stroke-width="${i%3===0?3:1.5}"/>`;
    }
    return `<svg viewBox="0 0 200 200" width="210" height="210" role="img" aria-label="clock">
      <circle cx="100" cy="100" r="96" fill="#fff" stroke="#1a2332" stroke-width="3"/>
      ${ticks}
      ${hand(ha, 50, 5, '#1a2332')}
      ${hand(ma, 76, 3, '#c2624a')}
      <circle cx="100" cy="100" r="4.5" fill="#1a2332"/>
    </svg>`;
  },

  renderFace() {
    const el = document.getElementById('clock-face');
    if (!el || !this.state.current) return;
    el.innerHTML = this.state.format === 'analogue'
      ? this.clockSVG(this.state.current.display)
      : `<div class="clock-digital">${this.state.current.display}</div>`;
  },

  next() {
    const picked = pickSmart('clock', DATA.times, t => t.es);
    this.state.current = picked.item;
    this.state.itemKey = picked.key;
    document.getElementById('feedback-area').innerHTML = '';
    this.state.awaitingNext = false;
    this.renderFace();
    this.renderInput();
  },

  renderInput() {
    const area = document.getElementById('clock-input-area');
    area.innerHTML = `
      <div class="input-row">
        <input type="text" id="clock-input" placeholder="e.g. son las tres y cuarto" autocomplete="off" autocapitalize="off" spellcheck="false">
        <button class="primary" id="clock-submit">Check</button>
      </div>
      ${accentBar('clock-input')}`;
    wireAccentBar(area);
    const input = document.getElementById('clock-input');
    input.focus();
    input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); this.check(input.value.trim()); }});
    document.getElementById('clock-submit').addEventListener('click', () => this.check(input.value.trim()));
  },

  check(answer) {
    if (this.state.awaitingNext) { this.next(); this.refreshStatsBlock(); return; }
    if (!answer) return;
    const expected = this.state.current.es;
    let fb;
    const m = answerMatch(answer, expected);
    if (m === 'exact') {
      recordResult('clock', this.state.itemKey, true);
      fb = `<div class="feedback correct">✓ Correct: <strong>${expected}</strong></div>`;
    } else if (m === 'accent') {
      recordResult('clock', this.state.itemKey, true);
      fb = `<div class="feedback almost">Nearly. Watch the accents: <strong>${expected}</strong>.${accentTrapNote(expected)}</div>`;
    } else {
      recordResult('clock', this.state.itemKey, false);
      fb = `<div class="feedback incorrect">✗ Answer: <strong>${expected}</strong>. You wrote "<em>${answer}</em>".</div>`;
    }
    document.getElementById('feedback-area').innerHTML =
      fb + `<div style="margin-top:0.5rem;"><button class="primary" id="clock-next">Next</button></div>`;
    document.getElementById('clock-next').addEventListener('click', () => { this.next(); this.refreshStatsBlock(); });
    this.state.awaitingNext = true;
  },

  refreshStatsBlock() {
    const block = document.getElementById('stats-block');
    if (block) block.outerHTML = this.renderStatsBlock();
  }
};

// --- 13. ERRANDS (click the place) ---
Games.errands = {
  name: 'Errands',
  description: 'Click where each person needs to go',
  state: { current: null, character: null, scene: null, target: null, itemKey: null, answered: false },

  init() {
    this.state = { current: null, character: null, scene: null, target: null, itemKey: null, answered: false };
    const main = document.getElementById('main');
    main.innerHTML = `
      <div class="prompt-ask">Where do they need to go? Click the place.</div>
      <div id="errand-area"></div>
      <div id="feedback-area"></div>
      ${this.renderStatsBlock()}
    `;
    this.next();
  },

  renderStatsBlock() {
    const s = gameAggregateStats('errands');
    const acc = s.total > 0 ? Math.round((s.correct/s.total)*100) + '%' : '—';
    return `<div class="game-stats" id="stats-block">
      <div class="stats-row"><span>Attempts</span><strong>${s.total}</strong></div>
      <div class="stats-row"><span>Accuracy</span><strong>${acc}</strong></div>
    </div>`;
  },

  findPlace(placeEs) {
    for (const sc of DATA.cityScenes) {
      const hit = sc.items.find(it => it.kind === 'place' && it.es === placeEs);
      if (hit) return { scene: sc, hotspot: hit };
    }
    return null;
  },

  next() {
    const picked = pickSmart('errands', DATA.cityRequests, r => r.place);
    const req = picked.item;
    const loc = this.findPlace(req.place);
    this.state.itemKey = picked.key;
    this.state.current = req;
    this.state.scene = loc.scene;
    this.state.target = loc.hotspot;
    this.state.character = DATA.characters[Math.floor(Math.random() * DATA.characters.length)];
    this.state.answered = false;
    document.getElementById('feedback-area').innerHTML = '';
    this.render();
  },

  render() {
    const c = this.state.character, req = this.state.current, sc = this.state.scene;
    document.getElementById('errand-area').innerHTML = `
      <div class="errand-wrap">
        <div class="errand-side">
          <div class="errand-bubble">${req.es}</div>
          <img class="errand-char" src="${c.img}" alt="" decoding="async">
          <div class="errand-name">${c.name}</div>
        </div>
        <div class="errand-scene" id="errand-scene">
          <img id="errand-scene-img" src="${sc.img}" alt="city scene" decoding="async">
        </div>
      </div>`;
    document.getElementById('errand-scene').addEventListener('click', e => this.onClick(e));
  },

  ring(cls, x, y, r) {
    const d = document.createElement('div');
    d.className = 'errand-ring ' + cls;
    d.style.left = (x * 100) + '%';
    d.style.top = (y * 100) + '%';
    d.style.width = (r * 2 * 100) + '%';
    document.getElementById('errand-scene').appendChild(d);
  },

  onClick(e) {
    if (this.state.answered) return;
    const img = document.getElementById('errand-scene-img');
    const rect = img.getBoundingClientRect();
    if (!rect.width) return;
    const cxn = (e.clientX - rect.left) / rect.width;
    const cyn = (e.clientY - rect.top) / rect.height;
    const t = this.state.target;
    // distance in width-normalized units (matches r = fraction of width)
    const dx = cxn - t.x;
    const dy = (cyn - t.y) * (rect.height / rect.width);
    const correct = Math.hypot(dx, dy) <= t.r * 1.5;

    this.state.answered = true;
    document.getElementById('errand-scene').classList.add('answered');
    this.ring('correct', t.x, t.y, t.r);
    if (!correct) this.ring('wrong', cxn, cyn, 0.035);
    recordResult('errands', this.state.itemKey, correct);

    const req = this.state.current;
    const fb = correct
      ? `<div class="feedback correct">✓ ¡Correcto! The <strong>${req.place}</strong>. "${req.es}" (${req.en})</div>`
      : `<div class="feedback incorrect">✗ Not there. They need the <strong>${req.place}</strong>. "${req.es}" (${req.en})</div>`;
    document.getElementById('feedback-area').innerHTML =
      fb + `<div style="margin-top:0.5rem;"><button class="primary" id="errand-next">Next</button></div>`;
    document.getElementById('errand-next').addEventListener('click', () => { this.next(); this.refreshStatsBlock(); });
  },

  refreshStatsBlock() {
    const block = document.getElementById('stats-block');
    if (block) block.outerHTML = this.renderStatsBlock();
  }
};

// Global hint button handler — event delegation so it works for any game
document.addEventListener('click', (e) => {
  if (e.target.classList && e.target.classList.contains('hint-btn')) {
    const row = e.target.closest('.hint-row');
    if (row) {
      const text = row.querySelector('.hint-text');
      if (text) text.classList.remove('hidden');
      e.target.classList.add('hidden');
    }
  }
});

async function init() {
  await loadProgress();
  navigateTo('home');
}
init();
